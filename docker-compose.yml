services:
  prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: sergeysazonov/bazhov-dictionary:latest
    container_name: bazhov-dictionary-prod
    ports:
      - "4000:3000"
    restart: always
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}